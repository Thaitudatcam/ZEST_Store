spring.application.name=ZestStore

# ==============================================
# SQL Server
# ==============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;instanceName=SQLEXPRESS;databaseName=PoloShopDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==============================================
# JPA / Hibernate
# ==============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ==============================================
# JWT
# ==============================================
app.jwt.secret=ZestStoreSecretKey2026ForJWTTokenGenerationMustBe256BitsLong
app.jwt.expiration=86400000

# ==============================================
# File upload
# ==============================================
